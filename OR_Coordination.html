<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OR Coordination — مدينة الملك سعود الطبية</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --border: #e2e5ea;
    --text-primary: #0f1923;
    --text-secondary: #64748b;
    --text-hint: #94a3b8;
    --blue: #1a56db;
    --blue-light: #ebf5ff;
    --blue-mid: #93c5fd;
    --green: #057a55;
    --green-light: #e3fcef;
    --amber: #92400e;
    --amber-light: #fffbeb;
    --red: #991b1b;
    --red-light: #fef2f2;
    --gray-light: #f8fafc;
  }

  body {
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 14px;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-logo-icon {
    width: 32px;
    height: 32px;
    background: var(--blue);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .header-logo-icon svg { width: 18px; height: 18px; fill: white; }

  .header-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .header-subtitle {
    font-size: 11px;
    color: var(--text-secondary);
  }

  .header-stats {
    display: flex;
    gap: 20px;
  }

  .stat-item {
    text-align: center;
  }

  .stat-num {
    font-size: 18px;
    font-weight: 600;
    color: var(--blue);
  }

  .stat-label {
    font-size: 10px;
    color: var(--text-secondary);
  }

  /* Main */
  .main { padding: 20px 24px; }

  /* Filters */
  .filters-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .filters-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: flex-start;
  }

  .filter-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 140px;
  }

  .filter-group-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .filter-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .pill {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: var(--gray-light);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    white-space: nowrap;
  }

  .pill:hover { border-color: var(--blue-mid); color: var(--blue); }

  .pill.active {
    background: var(--blue-light);
    border-color: var(--blue);
    color: var(--blue);
    font-weight: 500;
  }

  .filters-actions {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }

  .btn-reset {
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: white;
    color: var(--text-secondary);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .btn-reset:hover { background: var(--bg); }

  .search-input {
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 13px;
    border: 1px solid var(--border);
    background: var(--gray-light);
    color: var(--text-primary);
    font-family: inherit;
    width: 200px;
    transition: all 0.15s;
  }

  .search-input:focus {
    outline: none;
    border-color: var(--blue);
    background: white;
  }

  /* Results bar */
  .results-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    padding: 0 2px;
  }

  .results-count {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .results-count span { font-weight: 600; color: var(--text-primary); }

  /* Table */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    padding: 10px 14px;
    text-align: right;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    background: var(--gray-light);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }

  thead th:hover { color: var(--blue); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--gray-light); }

  td {
    padding: 10px 14px;
    color: var(--text-primary);
    white-space: nowrap;
  }

  .td-mrn { font-family: monospace; font-size: 12px; color: var(--text-secondary); }

  .td-name { font-weight: 500; }

  .td-date { font-size: 12px; }

  .td-date.no-date {
    color: var(--text-hint);
    font-style: italic;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
  }

  .badge-routine { background: var(--blue-light); color: var(--blue); }
  .badge-ds { background: var(--green-light); color: var(--green); }

  .td-avg { font-weight: 500; }
  .td-avg.high { color: var(--red); }
  .td-avg.mid { color: var(--amber); }
  .td-avg.low { color: var(--green); }

  .wa-btns { display: flex; gap: 6px; align-items: center; }

  .wa-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    border: 1px solid;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .wa-btn-ds {
    background: var(--green-light);
    color: var(--green);
    border-color: #6ee7b7;
  }

  .wa-btn-ds:hover { background: #d1fae5; }

  .wa-btn-r {
    background: var(--blue-light);
    color: var(--blue);
    border-color: var(--blue-mid);
  }

  .wa-btn-r:hover { background: #dbeafe; }

  .wa-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    display: inline-block;
  }

  .wa-dot-green { background: var(--green); }
  .wa-dot-blue { background: var(--blue); }

  .no-phone {
    font-size: 11px;
    color: var(--text-hint);
    font-style: italic;
  }

  /* Empty state */
  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--text-secondary);
  }

  .empty-state p { font-size: 14px; margin-top: 8px; }

  /* Loading */
  .loading {
    padding: 60px 20px;
    text-align: center;
    color: var(--text-secondary);
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Refresh btn */
  .btn-refresh {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: white;
    color: var(--text-secondary);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .btn-refresh:hover { background: var(--bg); color: var(--blue); border-color: var(--blue-mid); }
  .btn-refresh svg { width: 14px; height: 14px; }

  .last-update {
    font-size: 11px;
    color: var(--text-hint);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <div class="header-logo-icon">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
    </div>
    <div>
      <div class="header-title">OR Coordination</div>
      <div class="header-subtitle">مدينة الملك سعود الطبية — قسم تنسيق العمليات</div>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-item">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">إجمالي المرضى</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="stat-scheduled" style="color:#057a55">—</div>
      <div class="stat-label">مجدولون</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="stat-unscheduled" style="color:#92400e">—</div>
      <div class="stat-label">غير مجدولين</div>
    </div>
  </div>
</div>

<div class="main">

  <div class="filters-card">
    <div class="filters-row">
      <div class="filter-group">
        <div class="filter-group-label">الطبيب</div>
        <div class="filter-pills" id="surgeon-pills"></div>
      </div>
      <div class="filter-group">
        <div class="filter-group-label">نوع العملية</div>
        <div class="filter-pills" id="type-pills">
          <span class="pill active" onclick="toggleFilter('type','all',this)">الكل</span>
          <span class="pill" onclick="toggleFilter('type','Routine',this)">Routine</span>
          <span class="pill" onclick="toggleFilter('type','Day Surgery',this)">Day Surgery</span>
        </div>
      </div>
      <div class="filter-group">
        <div class="filter-group-label">الجدولة</div>
        <div class="filter-pills" id="schedule-pills">
          <span class="pill active" onclick="toggleFilter('schedule','all',this)">الكل</span>
          <span class="pill" onclick="toggleFilter('schedule','scheduled',this)">مجدولون</span>
          <span class="pill" onclick="toggleFilter('schedule','unscheduled',this)">غير مجدولين</span>
        </div>
      </div>
      <div class="filters-actions">
        <input class="search-input" id="search-input" placeholder="بحث باسم المريض..." oninput="applyFilters()" />
        <button class="btn-reset" onclick="resetFilters()">مسح الفلاتر</button>
        <button class="btn-refresh" onclick="loadData()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 013.51 15"/></svg>
          تحديث
        </button>
      </div>
    </div>
  </div>

  <div class="results-bar">
    <div class="results-count">عرض <span id="shown-count">—</span> من أصل <span id="total-count">—</span> مريض</div>
    <div class="last-update" id="last-update"></div>
  </div>

  <div class="table-card">
    <div class="table-wrap">
      <div id="table-container">
        <div class="loading">
          <div class="spinner"></div>
          <div>جاري تحميل البيانات...</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const SHEET_ID = '1VGQMxYgkcmQLurL9nG794Uv5vcIt43Aa8rBKknpZtPo';
const SHEET_NAME = 'Sheet1';

let allData = [];
let filters = { surgeon: 'all', type: 'all', schedule: 'all' };

const days = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];

async function loadData() {
  document.getElementById('table-container').innerHTML = `<div class="loading"><div class="spinner"></div><div>جاري تحميل البيانات...</div></div>`;
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.substring(47, text.length - 2));
    const rows = json.table.rows;

    allData = rows.map(row => {
      const c = row.c;
      return {
        mrn:       c[0]?.v?.toString() || '',
        date:      c[1]?.v || c[1]?.f || '',
        dateF:     c[1]?.f || '',
        firstName: c[2]?.v || '',
        specialty: c[3]?.v || '',
        admType:   c[4]?.v || '',
        surgeon:   c[5]?.v || '',
        avgWT:     c[6]?.v || 0,
        procedure: c[7]?.v || '',
        phone:     c[8]?.v?.toString() || '',
      };
    }).filter(r => r.mrn);

    buildSurgeonPills();
    updateStats();
    applyFilters();
    document.getElementById('last-update').textContent = 'آخر تحديث: ' + new Date().toLocaleTimeString('ar-SA');
  } catch(e) {
    document.getElementById('table-container').innerHTML = `<div class="empty-state"><p>تعذر تحميل البيانات. تأكد من أن الشيت مشارك للعموم.</p></div>`;
  }
}

function buildSurgeonPills() {
  const surgeons = [...new Set(allData.map(r => r.surgeon).filter(Boolean))].sort();
  const container = document.getElementById('surgeon-pills');
  container.innerHTML = `<span class="pill active" onclick="toggleFilter('surgeon','all',this)">الكل</span>`;
  surgeons.forEach(s => {
    const shortName = s.split(' ').slice(0,2).join(' ');
    container.innerHTML += `<span class="pill" onclick="toggleFilter('surgeon','${s}',this)" title="${s}">${shortName}</span>`;
  });
}

function toggleFilter(type, value, el) {
  filters[type] = value;
  el.closest('.filter-pills').querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function resetFilters() {
  filters = { surgeon: 'all', type: 'all', schedule: 'all' };
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.filter-pills').forEach(group => {
    group.querySelectorAll('.pill').forEach((p, i) => {
      p.classList.toggle('active', i === 0);
    });
  });
  applyFilters();
}

function applyFilters() {
  const search = document.getElementById('search-input').value.toLowerCase();
  let filtered = allData.filter(r => {
    if (filters.surgeon !== 'all' && r.surgeon !== filters.surgeon) return false;
    if (filters.type !== 'all' && r.admType !== filters.type) return false;
    if (filters.schedule === 'scheduled' && (!r.date || r.date === 'Not scheduled')) return false;
    if (filters.schedule === 'unscheduled' && r.date && r.date !== 'Not scheduled') return false;
    if (search && !r.firstName.toLowerCase().includes(search) && !r.mrn.includes(search)) return false;
    return true;
  });

  document.getElementById('shown-count').textContent = filtered.length;
  document.getElementById('total-count').textContent = allData.length;
  renderTable(filtered);
}

function updateStats() {
  document.getElementById('stat-total').textContent = allData.length;
  const scheduled = allData.filter(r => r.date && r.date !== 'Not scheduled').length;
  document.getElementById('stat-scheduled').textContent = scheduled;
  document.getElementById('stat-unscheduled').textContent = allData.length - scheduled;
}

function formatDate(row) {
  if (!row.date || row.date === 'Not scheduled') return '<span class="td-date no-date">غير مجدول</span>';
  if (row.dateF) return `<span class="td-date">${row.dateF}</span>`;
  try {
    const d = new Date(row.date);
    if (!isNaN(d)) {
      const day = days[d.getDay()];
      const formatted = d.toLocaleDateString('ar-SA', {day:'2-digit',month:'2-digit',year:'numeric'});
      return `<span class="td-date" title="${day}">${formatted}</span>`;
    }
  } catch(e) {}
  return `<span class="td-date">${row.date}</span>`;
}

function buildWALink(phone, name, date, admType) {
  if (!phone || phone.length < 7) return '<span class="no-phone">لا يوجد رقم</span>';

  const intlPhone = '966' + phone.replace(/^0/, '');

  let dateStr = '___';
  let dayName = '____';
  if (date && date !== 'Not scheduled') {
    try {
      const d = new Date(date);
      if (!isNaN(d)) {
        dateStr = d.toLocaleDateString('ar-SA', {day:'2-digit',month:'2-digit',year:'numeric'});
        dayName = days[d.getDay()];
      }
    } catch(e) {}
  }

  const msgDS = encodeURIComponent(
    `السلام عليكم ورحمة الله وبركاته\nعزيزي/عزيزتي ${name}\nنود إبلاغكم بأن موعد عمليتكم في مدينة الملك سعود الطبية قد تم تحديده يوم ${dayName} الموافق ${dateStr}\n\n📌 تعليمات مهمة:\n• الصيام من الساعة 12:00 منتصف الليل صيام كلي عن الأكل والشرب (حتى الماء) والتدخين\n• الحضور إلى برج الباطنة الأول - الدور الأرضي - مكتب الدخول - الساعة 6:00 صباحاً\n• إحضار الهوية الوطنية / الإقامة\n• للنساء الرجاء إزالة المكياج، طلاء الأظافر، والإكسسوارات قبل الحضور\n\n‼️ الرجاء إبلاغنا في حال أخذ أدوية مسيلة للدم أو إبر إنقاص الوزن\n‼️ بخصوص أدوية الضغط والسكر وغيرها، يرجى اتباع تعليمات المنسق المذكورة أثناء الاتصال\n\n⚠️ تنبيه: الرجاء الالتزام بالحضور في حال التأخير أو عدم الحضور سيتم إغلاق الطلب الجراحي\n\nمدينة الملك سعود الطبية - قسم تنسيق العمليات`
  );

  const msgR = encodeURIComponent(
    `السلام عليكم ورحمة الله وبركاته\nعزيزي/عزيزتي ${name}\nنود إبلاغكم بأن موعد عمليتكم في مدينة الملك سعود الطبية قد تم تحديده يوم ${dayName} الموافق ${dateStr}\nوسيكون التنويم يوم ____ الموافق ____\n\n📌 تعليمات مهمة:\n• سيتم التواصل معكم في نفس يوم التنويم لتحديد وقت الحضور، يرجى الانتباه للجوال\n• إحضار الهوية الوطنية / الإقامة أثناء التنويم\n• للنساء: يرجى إزالة المكياج، طلاء الأظافر، والإكسسوارات قبل الحضور\n\n‼️ الرجاء إبلاغنا في حال أخذ أدوية مسيلة للدم أو إبر إنقاص الوزن\n\n⚠️ تنبيه: الرجاء الالتزام بالحضور، وفي حال عدم الحضور سيتم إغلاق الطلب الجراحي\n\nمدينة الملك سعود الطبية - قسم تنسيق العمليات`
  );

  return `
    <div class="wa-btns">
      <a class="wa-btn wa-btn-ds" href="https://web.whatsapp.com/send?phone=${intlPhone}&text=${msgDS}" target="_blank">
        <span class="wa-dot wa-dot-green"></span> DS
      </a>
      <a class="wa-btn wa-btn-r" href="https://web.whatsapp.com/send?phone=${intlPhone}&text=${msgR}" target="_blank">
        <span class="wa-dot wa-dot-blue"></span> R
      </a>
    </div>`;
}

function renderTable(data) {
  if (data.length === 0) {
    document.getElementById('table-container').innerHTML = `<div class="empty-state"><p>لا توجد نتائج مطابقة للفلاتر المحددة</p></div>`;
    return;
  }

  let html = `<table>
    <thead>
      <tr>
        <th>MRN</th>
        <th>اسم المريض</th>
        <th>تاريخ العملية</th>
        <th>الطبيب</th>
        <th>نوع الدخول</th>
        <th>العملية</th>
        <th>متوسط الانتظار</th>
        <th>واتساب</th>
      </tr>
    </thead>
    <tbody>`;

  data.forEach(r => {
    const avgClass = r.avgWT > 100 ? 'high' : r.avgWT > 60 ? 'mid' : 'low';
    const typeClass = r.admType === 'Day Surgery' ? 'badge-ds' : 'badge-routine';
    const surgeonShort = r.surgeon.split(' ').slice(0,3).join(' ');

    html += `<tr>
      <td class="td-mrn">${r.mrn}</td>
      <td class="td-name">${r.firstName}</td>
      <td>${formatDate(r)}</td>
      <td title="${r.surgeon}">${surgeonShort}</td>
      <td><span class="badge ${typeClass}">${r.admType || '—'}</span></td>
      <td>${r.procedure || '—'}</td>
      <td class="td-avg ${avgClass}">${r.avgWT || '—'}</td>
      <td>${buildWALink(r.phone, r.firstName, r.date, r.admType)}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  document.getElementById('table-container').innerHTML = html;
}

loadData();
</script>
