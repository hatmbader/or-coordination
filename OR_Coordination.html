<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OR Coordination — مدينة الملك سعود الطبية</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f5f7; --surface: #ffffff; --border: #e2e5ea;
    --text-primary: #0f1923; --text-secondary: #64748b; --text-hint: #94a3b8;
    --blue: #1a56db; --blue-light: #ebf5ff; --blue-mid: #93c5fd;
    --green: #057a55; --green-light: #e3fcef;
    --amber: #92400e; --red: #991b1b; --gray-light: #f8fafc;
  }
  body { font-family: 'IBM Plex Sans Arabic', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; font-size: 14px; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 32px; height: 32px; background: var(--blue); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-icon svg { width: 18px; height: 18px; fill: white; }
  .header-title { font-size: 15px; font-weight: 600; }
  .header-subtitle { font-size: 11px; color: var(--text-secondary); }
  .header-stats { display: flex; gap: 24px; }
  .stat-item { text-align: center; }
  .stat-num { font-size: 20px; font-weight: 600; }
  .stat-label { font-size: 10px; color: var(--text-secondary); }
  .main { padding: 20px 24px; }
  .filters-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .filters-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
  .filter-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 140px; }
  .filter-group-label { font-size: 11px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
  .filter-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill { padding: 5px 12px; border-radius: 20px; font-size: 12px; border: 1px solid var(--border); background: var(--gray-light); color: var(--text-secondary); cursor: pointer; transition: all 0.15s; user-select: none; white-space: nowrap; }
  .pill:hover { border-color: var(--blue-mid); color: var(--blue); }
  .pill.active { background: var(--blue-light); border-color: var(--blue); color: var(--blue); font-weight: 500; }
  .filters-actions { display: flex; align-items: flex-end; gap: 8px; flex-wrap: wrap; }
  .search-input { padding: 7px 12px; border-radius: 8px; font-size: 13px; border: 1px solid var(--border); background: var(--gray-light); color: var(--text-primary); font-family: inherit; width: 200px; }
  .search-input:focus { outline: none; border-color: var(--blue); background: white; }
  .btn { padding: 7px 14px; border-radius: 8px; font-size: 12px; border: 1px solid var(--border); background: white; color: var(--text-secondary); cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .btn:hover { background: var(--bg); color: var(--blue); border-color: var(--blue-mid); }
  .btn svg { width: 13px; height: 13px; }
  .results-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding: 0 2px; }
  .results-count { font-size: 12px; color: var(--text-secondary); }
  .results-count span { font-weight: 600; color: var(--text-primary); }
  .last-update { font-size: 11px; color: var(--text-hint); }
  .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { padding: 10px 14px; text-align: right; font-size: 11px; font-weight: 500; color: var(--text-secondary); background: var(--gray-light); border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--gray-light); }
  td { padding: 8px 14px; white-space: nowrap; vertical-align: middle; }
  .td-mrn { font-family: monospace; font-size: 12px; color: var(--text-secondary); }
  .td-name { font-weight: 500; }
  .td-nodate { color: var(--text-hint); font-style: italic; font-size: 12px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-r { background: var(--blue-light); color: var(--blue); }
  .badge-ds { background: var(--green-light); color: var(--green); }
  .avg-high { color: var(--red); font-weight: 500; }
  .avg-mid { color: var(--amber); font-weight: 500; }
  .avg-low { color: var(--green); font-weight: 500; }
  .phone-input { padding: 4px 8px; border-radius: 6px; font-size: 12px; border: 1px solid var(--border); background: var(--gray-light); color: var(--text-primary); font-family: inherit; width: 130px; direction: ltr; }
  .phone-input:focus { outline: none; border-color: var(--blue); background: white; }
  .phone-input::placeholder { color: var(--text-hint); font-size: 11px; }
  .wa-btns { display: flex; gap: 5px; }
  .wa-btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; text-decoration: none; border: 1px solid; transition: all 0.15s; white-space: nowrap; }
  .wa-ds { background: var(--green-light); color: var(--green); border-color: #6ee7b7; cursor: pointer; }
  .wa-ds:hover { background: #d1fae5; }
  .wa-r { background: var(--blue-light); color: var(--blue); border-color: var(--blue-mid); cursor: pointer; }
  .wa-r:hover { background: #dbeafe; }
  .wa-btn.disabled { opacity: 0.35; pointer-events: none; }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .dot-g { background: var(--green); }
  .dot-b { background: var(--blue); }
  .loading { padding: 60px 20px; text-align: center; color: var(--text-secondary); }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { padding: 60px 20px; text-align: center; color: var(--text-secondary); }
  .selected-count { font-size: 11px; color: var(--blue); margin-right: 4px; font-weight: 400; text-transform: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
    </div>
    <div>
      <div class="header-title">OR Coordination</div>
      <div class="header-subtitle">مدينة الملك سعود الطبية — قسم تنسيق العمليات</div>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-item"><div class="stat-num" id="s-total" style="color:var(--blue)">—</div><div class="stat-label">إجمالي المرضى</div></div>
    <div class="stat-item"><div class="stat-num" id="s-sched" style="color:var(--green)">—</div><div class="stat-label">مجدولون</div></div>
    <div class="stat-item"><div class="stat-num" id="s-unsched" style="color:var(--amber)">—</div><div class="stat-label">غير مجدولين</div></div>
  </div>
</div>

<div class="main">
  <div class="filters-card">
    <div class="filters-row">
      <div class="filter-group">
        <div class="filter-group-label">الطبيب <span class="selected-count" id="surgeon-count"></span></div>
        <div class="filter-pills" id="surgeon-pills"></div>
      </div>
      <div class="filter-group">
        <div class="filter-group-label">نوع الدخول</div>
        <div class="filter-pills" id="type-pills">
          <span class="pill active" onclick="setSingle('type','all',this)">الكل</span>
          <span class="pill" onclick="setSingle('type','Routine',this)">Routine</span>
          <span class="pill" onclick="setSingle('type','Day Surgery',this)">Day Surgery</span>
        </div>
      </div>
      <div class="filter-group">
        <div class="filter-group-label">الجدولة</div>
        <div class="filter-pills" id="sched-pills">
          <span class="pill active" onclick="setSingle('sched','all',this)">الكل</span>
          <span class="pill" onclick="setSingle('sched','yes',this)">مجدولون</span>
          <span class="pill" onclick="setSingle('sched','no',this)">غير مجدولين</span>
        </div>
      </div>
      <div class="filters-actions">
        <input class="search-input" id="search" placeholder="بحث باسم المريض..." oninput="render()">
        <button class="btn" onclick="reset()">مسح الفلاتر</button>
        <button class="btn" onclick="load()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 013.51 15"/></svg>
          تحديث
        </button>
      </div>
    </div>
  </div>

  <div class="results-bar">
    <div class="results-count">عرض <span id="shown">—</span> من <span id="total">—</span> مريض</div>
    <div class="last-update" id="updated"></div>
  </div>

  <div class="table-card">
    <div class="table-wrap" id="container">
      <div class="loading"><div class="spinner"></div><div>جاري تحميل البيانات...</div></div>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1VGQMxYgkcmQLurL9nG794Uv5vcIt43Aa8rBKknpZtPo';
const TAB = 'Sheet1';
const DAYS = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

let rows = [];
let selectedSurgeons = new Set();
let F = { type: 'all', sched: 'all' };
let phones = {};

async function load() {
  document.getElementById('container').innerHTML = '<div class="loading"><div class="spinner"></div><div>جاري تحميل البيانات...</div></div>';
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(TAB)}&headers=1`;
    const res = await fetch(url);
    const csv = await res.text();
    rows = parseCSV(csv);
    buildSurgeons();
    updateStats();
    render();
    document.getElementById('updated').textContent = 'آخر تحديث: ' + new Date().toLocaleTimeString('ar-SA');
  } catch(e) {
    document.getElementById('container').innerHTML = '<div class="empty">تعذر تحميل البيانات. تأكد أن الشيت مشارك للعموم.</div>';
  }
}

function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  return lines.slice(1).map(line => {
    const cols = parseLine(line);
    return {
      mrn: cols[0]||'', date: cols[1]||'', name: cols[2]||'',
      specialty: cols[3]||'', admType: cols[4]||'', surgeon: cols[5]||'',
      avgWT: parseFloat(cols[6])||0, procedure: cols[7]||'',
    };
  }).filter(r => r.mrn && r.mrn !== 'MRN');
}

function parseLine(line) {
  const result = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur.trim());
  return result;
}

function parseDate(raw) {
  if (!raw || raw === 'Not scheduled' || raw.trim() === '') return null;
  raw = raw.trim();
  let m = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return new Date(parseInt(m[3]), parseInt(m[1])-1, parseInt(m[2]));
  m = raw.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
  if (m) return new Date(parseInt(m[3]), parseInt(m[2])-1, parseInt(m[1]));
  if (/^\d+(\.\d+)?$/.test(raw)) {
    const serial = parseFloat(raw);
    if (serial > 40000 && serial < 60000) return new Date(Math.round((serial - 25569) * 86400 * 1000));
  }
  const d = new Date(raw);
  if (!isNaN(d)) return d;
  return null;
}

function formatDate(raw) {
  const d = parseDate(raw);
  if (!d) return '<span class="td-nodate">غير مجدول</span>';
  return `<span>${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}</span>`;
}

function buildSurgeons() {
  const surgeons = [...new Set(rows.map(r => r.surgeon).filter(Boolean))].sort();
  const el = document.getElementById('surgeon-pills');
  el.innerHTML = '';
  surgeons.forEach(s => {
    const short = s.split(' ').slice(0,2).join(' ');
    const pill = document.createElement('span');
    pill.className = 'pill';
    pill.title = s;
    pill.textContent = short;
    pill.addEventListener('click', function() {
      if (selectedSurgeons.has(s)) {
        selectedSurgeons.delete(s);
        pill.classList.remove('active');
      } else {
        selectedSurgeons.add(s);
        pill.classList.add('active');
      }
      updateSurgeonCount();
      render();
    });
    el.appendChild(pill);
  });
}

function updateSurgeonCount() {
  const el = document.getElementById('surgeon-count');
  el.textContent = selectedSurgeons.size > 0 ? '(' + selectedSurgeons.size + ' محدد)' : '';
}

function setSingle(key, val, el) {
  F[key] = val;
  el.closest('.filter-pills').querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  render();
}

function reset() {
  selectedSurgeons.clear();
  F = { type: 'all', sched: 'all' };
  document.getElementById('search').value = '';
  document.getElementById('surgeon-count').textContent = '';
  document.querySelectorAll('#surgeon-pills .pill').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('#type-pills .pill').forEach((p,i) => p.classList.toggle('active', i===0));
  document.querySelectorAll('#sched-pills .pill').forEach((p,i) => p.classList.toggle('active', i===0));
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = rows.filter(r => {
    if (selectedSurgeons.size > 0 && !selectedSurgeons.has(r.surgeon)) return false;
    if (F.type !== 'all' && r.admType !== F.type) return false;
    const hasDate = !!parseDate(r.date);
    if (F.sched === 'yes' && !hasDate) return false;
    if (F.sched === 'no' && hasDate) return false;
    if (q && !r.name.toLowerCase().includes(q) && !r.mrn.includes(q)) return false;
    return true;
  });

  document.getElementById('shown').textContent = filtered.length;
  document.getElementById('total').textContent = rows.length;

  if (!filtered.length) {
    document.getElementById('container').innerHTML = '<div class="empty">لا توجد نتائج مطابقة</div>';
    return;
  }

  let html = `<table><thead><tr>
    <th>MRN</th><th>اسم المريض</th><th>تاريخ العملية</th>
    <th>الطبيب</th><th>نوع الدخول</th><th>العملية</th>
    <th>متوسط الانتظار</th><th>رقم الجوال</th><th>إرسال واتساب</th>
  </tr></thead><tbody>`;

  filtered.forEach(r => {
    const idx = rows.indexOf(r);
    const typeClass = r.admType === 'Day Surgery' ? 'badge-ds' : 'badge-r';
    const avgClass = r.avgWT > 100 ? 'avg-high' : r.avgWT > 60 ? 'avg-mid' : 'avg-low';
    const surgShort = r.surgeon.split(' ').slice(0,3).join(' ');
    const savedPhone = phones[idx] || '';

    html += `<tr>
      <td class="td-mrn">${r.mrn}</td>
      <td class="td-name">${r.name}</td>
      <td>${formatDate(r.date)}</td>
      <td title="${r.surgeon}">${surgShort}</td>
      <td><span class="badge ${typeClass}">${r.admType||'—'}</span></td>
      <td>${r.procedure||'—'}</td>
      <td class="${avgClass}">${r.avgWT||'—'}</td>
      <td><input class="phone-input" placeholder="05XXXXXXXX" value="${savedPhone}" oninput="phones[${idx}]=this.value;updateWA(${idx})"></td>
      <td><div class="wa-btns" id="wa-${idx}">${buildWA(r,idx,savedPhone)}</div></td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('container').innerHTML = html;
}

function updateWA(idx) {
  document.getElementById('wa-'+idx).innerHTML = buildWA(rows[idx], idx, phones[idx]||'');
}

function buildWA(r, idx, phone) {
  const d = parseDate(r.date);
  let dateStr = '___', dayName = '____';
  if (d) {
    dateStr = String(d.getDate()).padStart(2,'0') + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + d.getFullYear();
    dayName = DAYS[d.getDay()];
  }
  const clean = phone.replace(/\D/g,'');
  const ok = clean.length >= 9;
  const intl = '966' + clean.replace(/^0/,'');

  const ds = encodeURIComponent('السلام عليكم ورحمة الله وبركاته\nعزيزي/عزيزتي ' + r.name + '\nنود إبلاغكم بأن موعد عمليتكم في مدينة الملك سعود الطبية قد تم تحديده يوم ' + dayName + ' الموافق ' + dateStr + '\n\n📌 تعليمات مهمة:\n• الصيام من الساعة 12:00 منتصف الليل صيام كلي عن الأكل والشرب (حتى الماء) والتدخين\n• الحضور إلى برج الباطنة الأول - الدور الأرضي - مكتب الدخول - الساعة 6:00 صباحاً\n• إحضار الهوية الوطنية / الإقامة\n• للنساء الرجاء إزالة المكياج، طلاء الأظافر، والإكسسوارات قبل الحضور\n\n‼️ الرجاء إبلاغنا في حال أخذ أدوية مسيلة للدم أو إبر إنقاص الوزن\n‼️ بخصوص أدوية الضغط والسكر وغيرها، يرجى اتباع تعليمات المنسق المذكورة أثناء الاتصال\n\n⚠️ تنبيه: الرجاء الالتزام بالحضور في حال التأخير أو عدم الحضور سيتم إغلاق الطلب الجراحي\n\nمدينة الملك سعود الطبية - قسم تنسيق العمليات');

  const rv = encodeURIComponent('السلام عليكم ورحمة الله وبركاته\nعزيزي/عزيزتي ' + r.name + '\nنود إبلاغكم بأن موعد عمليتكم في مدينة الملك سعود الطبية قد تم تحديده يوم ' + dayName + ' الموافق ' + dateStr + '\nوسيكون التنويم يوم ____ الموافق ____\n\n📌 تعليمات مهمة:\n• سيتم التواصل معكم في نفس يوم التنويم لتحديد وقت الحضور، يرجى الانتباه للجوال\n• إحضار الهوية الوطنية / الإقامة أثناء التنويم\n• للنساء: يرجى إزالة المكياج، طلاء الأظافر، والإكسسوارات قبل الحضور\n\n‼️ الرجاء إبلاغنا في حال أخذ أدوية مسيلة للدم أو إبر إنقاص الوزن\n\n⚠️ تنبيه: الرجاء الالتزام بالحضور، وفي حال عدم الحضور سيتم إغلاق الطلب الجراحي\n\nمدينة الملك سعود الطبية - قسم تنسيق العمليات');

  return '<a class="wa-btn wa-ds' + (ok?'':' disabled') + '" ' + (ok?'href="https://web.whatsapp.com/send?phone='+intl+'&text='+ds+'" target="_blank"':'') + '><span class="dot dot-g"></span> DS</a>' +
         '<a class="wa-btn wa-r' + (ok?'':' disabled') + '" ' + (ok?'href="https://web.whatsapp.com/send?phone='+intl+'&text='+rv+'" target="_blank"':'') + '><span class="dot dot-b"></span> R</a>';
}

load();
</script>
</body>
</html>
